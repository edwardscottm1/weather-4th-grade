<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Weather</title>
    <!-- <link rel="icon" type="image/x-icon" href="images/bigfoot-icon.jpg"> -->
    <link href="styles.css" rel="stylesheet" type="text/css">
  </head>
  <body>
    <nav>
      <div><h1 id="title">⛅Weather</h1></div>
    </nav>
    <div id="search-location">
      <form>
        <input type="search" placeholder="Enter location">
        <input type="submit" value="Search" id="search">
      </form>
    </div>

    <div id="weather-data">
      <div id="current-sun-moon" class="data">
        <div  id="current-data">
          <h2 id="location">Santa Fe, NM, USA</h2>
        </div>
        
        <div  id="sun-data">
          <h2>🌄Sunrise</h2>
          <h2 class="hour">5:59 AM</h2>
          <h2>🌇Sunset</h2>
          <h2 class="hour">7:49 PM</h2>
        </div>

        <div  id="moon-data">
          <h2>Moon Phase</h2> 
          <!-- <div id="moon-drawing"><div id="moon"></div> -->
        </div>
      </div>
      <div id="hourly-daily" class="data">
        <div id="hourly-data">
          <h2>Hourly Forecast</h2>
          <div id="hours">
            <script src="create-hourly-elements.js"></script>
          </div>
        </div>
        <div id="daily-data">
          <h2>7 Day Forecast</h2>
          <div id="days">
            <script>

            </script>
          </div>
        </div>
      </div>
    </div>
   
    <script src = "script.js"></script>
  
</body>
</html>
